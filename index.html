<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src 'self' blob:; style-src 'self' 'unsafe-inline';">
  <title>ChronoSync</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
  <link rel="stylesheet" href="style.css?v=10">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1>ChronoSync</h1>
          <p class="subtitle">自动帧提取 · 自动对齐 · 同帧对比</p>
        </div>
        <div class="header-actions" id="headerActions" style="display:none;">
          <button class="btn-action" onclick="reselectVideos()">🔄 重新选择</button>
          <button class="btn-action" onclick="recalculate()">🔄 重新计算</button>
        </div>
      </div>
    </header>

    <!-- 步骤1: 上传视频 -->
    <section class="step" id="step1">
      <div class="step-header">
        <span class="step-number">1</span>
        <h2>上传视频</h2>
      </div>
      
      <div class="upload-area" id="uploadArea">
        <label for="fileInput" class="sr-only">选择视频文件</label>
        <input type="file" id="fileInput" accept="video/*" multiple hidden>
        <div class="upload-placeholder">
          <span class="upload-icon">📁</span>
          <p>拖放视频文件到此处，或点击选择</p>
          <p class="upload-hint">支持 MP4, WebM, MOV 等格式 · 最多选择 4 个视频</p>
        </div>
      </div>
      
      <div class="video-list" id="videoList"></div>
      
      <button class="btn btn-primary" id="nextBtn1" disabled onclick="goToStep(2)">
        下一步：框选计时器
      </button>
    </section>

    <!-- 步骤2: 框选计时器区域 -->
    <section class="step hidden" id="step2">
      <div class="step-header">
        <span class="step-number">2</span>
        <h2>框选计时器区域</h2>
        <button class="btn-action" onclick="autoDetectAll()" style="margin-left:12px;">🔍 自动识别</button>
      </div>
      
      <p class="hint">手动框选跑图视频中的计时器。点击「自动识别」可自动检测计时器区域，也可手动拖拽调整。注意避开上方的速度表，只框选计时器数字部分（右上角红/土黄色背景+白色数字）</p>
      
      <div class="region-panels" id="regionPanels"></div>
      
      <button class="btn btn-primary" id="nextBtn2" disabled onclick="goToStep(3)">
        开始分析
      </button>
    </section>

    <!-- 步骤3: 分析+对比 -->
    <section class="step hidden" id="step3">
      <div class="step-header">
        <span class="step-number">3</span>
        <h2>同步对比</h2>
      </div>
      
      <div id="analysisResult"></div>
      
      <div id="comparisonArea"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" integrity="sha384-GJqSu7vueQ9qN0E9yLPb3Wtpd7OrgK8KmYzC8T1IysG1bcvxvIO4qtYR/D3A991F" crossorigin="anonymous"></script>
  <script src="./ffmpeg/ffmpeg.js"></script>
  <script src="app.js?v=76"></script>
</body>
</html>
